<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>见微 睡眠呼吸报告预览</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #10233f;
        --muted: #66758f;
        --line: #dbe6f3;
        --panel: #ffffff;
        --wash: #eef6fb;
        --blue: #1566d8;
        --cyan: #18b8bf;
        --green: #22a16f;
        --orange: #d97918;
        --red: #c94141;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 20% 0%, rgba(24, 184, 191, 0.18), transparent 30rem),
          linear-gradient(180deg, #f7fbff 0%, #edf5fb 100%);
      }

      .shell {
        width: min(1180px, calc(100vw - 36px));
        margin: 0 auto;
        padding: 26px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(16, 35, 63, 0.12);
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .brand p,
      .status p,
      .card p {
        margin: 0;
      }

      .brand p {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #31516f;
        font-size: 13px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(34, 161, 111, 0.12);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
        gap: 18px;
        align-items: stretch;
      }

      .panel {
        border: 1px solid rgba(219, 230, 243, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 48px rgba(16, 35, 63, 0.08);
        backdrop-filter: blur(18px);
      }

      .summary {
        padding: 28px;
      }

      .eyebrow {
        color: var(--blue);
        font-size: 13px;
        font-weight: 700;
      }

      .summary h2 {
        margin: 10px 0 14px;
        font-size: clamp(28px, 5vw, 54px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .summary-text {
        max-width: 720px;
        color: #40536f;
        font-size: 17px;
        line-height: 1.8;
      }

      .risk-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: #31516f;
        font-size: 13px;
        font-weight: 650;
      }

      .pill.attention {
        border-color: rgba(217, 121, 24, 0.3);
        background: #fff7ec;
        color: #8b4d0a;
      }

      .pill.low {
        border-color: rgba(34, 161, 111, 0.28);
        background: #edfbf4;
        color: #116243;
      }

      .pill.invalid {
        border-color: rgba(201, 65, 65, 0.28);
        background: #fff0f0;
        color: #8f2626;
      }

      .night-card {
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 280px;
      }

      .night-card h3,
      .section-title {
        margin: 0;
        font-size: 16px;
      }

      .time-range {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .time-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 0;
        border-bottom: 1px solid var(--line);
      }

      .time-item span {
        color: var(--muted);
        font-size: 13px;
      }

      .time-item strong {
        font-size: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .card {
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric-value {
        display: flex;
        align-items: baseline;
        gap: 5px;
        margin-top: 12px;
      }

      .metric-value strong {
        font-size: 34px;
        line-height: 1;
      }

      .metric-value span {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-label {
        color: #40536f;
        font-size: 14px;
      }

      .chart-section {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
        gap: 18px;
        margin-top: 18px;
      }

      .chart {
        padding: 22px;
      }

      .bars {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        align-items: end;
        gap: 12px;
        height: 180px;
        padding-top: 22px;
      }

      .bar-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        height: 100%;
      }

      .bar {
        width: 100%;
        min-width: 26px;
        max-width: 42px;
        border-radius: 7px 7px 3px 3px;
        background: linear-gradient(180deg, var(--cyan), var(--blue));
      }

      .bar-wrap span {
        color: var(--muted);
        font-size: 12px;
      }

      .list-panel {
        padding: 22px;
      }

      .recommendations {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .recommendation {
        display: grid;
        grid-template-columns: 26px 1fr;
        gap: 10px;
        align-items: start;
        color: #304763;
        line-height: 1.6;
      }

      .check {
        display: inline-grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #e6f8f2;
        color: #0f8a5c;
        font-weight: 800;
      }

      .footer-note {
        margin-top: 18px;
        padding: 14px 16px;
        border: 1px solid #f0dcc2;
        border-radius: 8px;
        background: #fff8ee;
        color: #71512b;
        font-size: 13px;
        line-height: 1.6;
      }

      .loading {
        padding: 48px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .hero,
        .chart-section {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100vw - 24px, 1180px);
          padding-top: 16px;
        }

        .topbar,
        .status {
          align-items: flex-start;
          flex-direction: column;
        }

        .summary,
        .night-card,
        .chart,
        .list-panel {
          padding: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="assets/jianwei-logo.png" alt="见微" />
          <div>
            <h1>见微</h1>
            <p>家用 无感 不用戴</p>
          </div>
        </div>
        <div class="status">
          <span class="dot"></span>
          <p id="service-status">正在连接本地报告服务</p>
        </div>
      </header>

      <section id="app" class="loading">正在生成昨晚报告...</section>
    </main>

    <script>
      const endpoint = "/api/reports/demo";
      const app = document.querySelector("#app");
      const serviceStatus = document.querySelector("#service-status");

      function formatTime(value) {
        if (!value) return "--";
        return new Intl.DateTimeFormat("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        }).format(new Date(value));
      }

      function metric(value, fallback = "--") {
        return value === null || value === undefined ? fallback : value;
      }

      function riskClass(level) {
        return ["low", "attention", "invalid"].includes(level) ? level : "invalid";
      }

      function renderBars(report) {
        const m = report.metrics;
        const values = [
          Math.max(35, Math.min(100, (m.duration_minutes || 0) / 5)),
          Math.max(28, Math.min(92, (m.average_respiration || 0) * 4)),
          Math.max(28, Math.min(92, (m.average_heart_rate || 0) * 1.1)),
          Math.max(18, Math.min(100, 100 - (m.high_motion_events || 0) * 7)),
          Math.max(18, Math.min(100, 100 - (m.suspected_no_breath_events || 0) * 24)),
          Math.max(28, Math.min(96, report.risk.level === "attention" ? 58 : 86)),
          Math.max(28, Math.min(96, report.quality.level === "usable" ? 88 : 44)),
        ];
        const labels = ["时长", "呼吸", "心率", "体动", "暂停", "风险", "质量"];
        return values
          .map(
            (value, index) => `
              <div class="bar-wrap">
                <div class="bar" style="height:${value}%"></div>
                <span>${labels[index]}</span>
              </div>
            `
          )
          .join("");
      }

      function render(report) {
        const m = report.metrics;
        serviceStatus.textContent = "本地报告服务已连接";
        app.className = "";
        app.innerHTML = `
          <section class="hero">
            <article class="panel summary">
              <div class="eyebrow">昨晚睡眠呼吸报告</div>
              <h2>${report.risk.label}</h2>
              <p class="summary-text">${report.summary}</p>
              <div class="risk-row">
                <span class="pill ${riskClass(report.risk.level)}">风险等级 ${report.risk.label}</span>
                <span class="pill">数据质量 ${report.quality.level === "usable" ? "可用" : "不足"}</span>
                <span class="pill">会话 ${report.session_id}</span>
              </div>
            </article>
            <aside class="panel night-card">
              <div>
                <h3>夜间记录</h3>
                <div class="time-range">
                  <div class="time-item">
                    <span>开始</span>
                    <strong>${formatTime(report.started_at)}</strong>
                  </div>
                  <div class="time-item">
                    <span>结束</span>
                    <strong>${formatTime(report.ended_at)}</strong>
                  </div>
                  <div class="time-item">
                    <span>总时长</span>
                    <strong>${metric(m.duration_minutes)} 分钟</strong>
                  </div>
                </div>
              </div>
            </aside>
          </section>

          <section class="grid">
            <article class="card">
              <p class="metric-label">平均呼吸</p>
              <div class="metric-value"><strong>${metric(m.average_respiration)}</strong><span>次/分</span></div>
            </article>
            <article class="card">
              <p class="metric-label">平均心率</p>
              <div class="metric-value"><strong>${metric(m.average_heart_rate)}</strong><span>次/分</span></div>
            </article>
            <article class="card">
              <p class="metric-label">疑似呼吸中断</p>
              <div class="metric-value"><strong>${metric(m.suspected_no_breath_events)}</strong><span>段</span></div>
            </article>
            <article class="card">
              <p class="metric-label">高体动事件</p>
              <div class="metric-value"><strong>${metric(m.high_motion_events)}</strong><span>次</span></div>
            </article>
          </section>

          <section class="chart-section">
            <article class="panel chart">
              <h3 class="section-title">关键指标概览</h3>
              <div class="bars">${renderBars(report)}</div>
            </article>
            <aside class="panel list-panel">
              <h3 class="section-title">家庭建议</h3>
              <div class="recommendations">
                ${report.recommendations
                  .map(
                    (item) => `
                      <div class="recommendation">
                        <span class="check">✓</span>
                        <span>${item}</span>
                      </div>
                    `
                  )
                  .join("")}
              </div>
              <div class="footer-note">${report.disclaimer}</div>
            </aside>
          </section>
        `;
      }

      fetch(endpoint)
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(render)
        .catch((error) => {
          serviceStatus.textContent = "本地报告服务连接失败";
          app.className = "panel loading";
          app.textContent = `报告读取失败：${error.message}`;
        });
    </script>
  </body>
</html>
